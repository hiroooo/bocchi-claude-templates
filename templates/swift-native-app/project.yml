name: <ExampleApp>
options:
  bundleIdPrefix: <your.bundle.prefix>
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  groupSortPosition: top

configs:
  Debug: debug
  Release: release

settings:
  base:
    SWIFT_VERSION: "6.1"
    SWIFT_STRICT_CONCURRENCY: complete
    DEVELOPMENT_TEAM: "<YOUR_TEAM_ID>"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"

# ==========================================
# Swift Package: <ExampleApp>Feature (ローカル参照)
# ==========================================
packages:
  <ExampleApp>Package:
    path: <ExampleApp>Package
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads
    from: 12.0.0

# ==========================================
# Targets
# ==========================================
targets:
  <ExampleApp>:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: <ExampleApp>
        excludes:
          - "*.plist"
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: <your.bundle.prefix>.<example-app>
        PRODUCT_NAME: <ExampleApp>
        INFOPLIST_FILE: Config/<ExampleApp>-Info.plist
        CODE_SIGN_ENTITLEMENTS: Config/<ExampleApp>.entitlements
        GENERATE_INFOPLIST_FILE: "NO"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_USER_SCRIPT_SANDBOXING: "YES"
    dependencies:
      - package: <ExampleApp>Package
        product: <ExampleApp>Feature
      - package: GoogleMobileAds
        product: GoogleMobileAds
      - target: <ExampleApp>Widgets

  <ExampleApp>Widgets:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: <ExampleApp>Widgets
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: <your.bundle.prefix>.<example-app>.widgets
        PRODUCT_NAME: <ExampleApp>Widgets
        INFOPLIST_FILE: Config/<ExampleApp>Widgets-Info.plist
        CODE_SIGN_ENTITLEMENTS: Config/<ExampleApp>Widgets.entitlements
        GENERATE_INFOPLIST_FILE: "NO"
        SKIP_INSTALL: "YES"
    dependencies:
      - package: <ExampleApp>Package
        product: <ExampleApp>Shared

  <ExampleApp>FeatureTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: <ExampleApp>Package/Tests/<ExampleApp>FeatureTests
        excludes:
          - "Fixtures/.gitignore"
    configFiles:
      Debug: Config/Tests.xcconfig
      Release: Config/Tests.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: <your.bundle.prefix>.<example-app>.featuretests
    dependencies:
      - target: <ExampleApp>
      - package: <ExampleApp>Package
        product: <ExampleApp>Feature
      - package: GoogleMobileAds
        product: GoogleMobileAds

  <ExampleApp>UITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: <ExampleApp>UITests
        optional: true
    configFiles:
      Debug: Config/Tests.xcconfig
      Release: Config/Tests.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: <your.bundle.prefix>.<example-app>.uitests
        TEST_TARGET_NAME: <ExampleApp>
    dependencies:
      - target: <ExampleApp>

# ==========================================
# Schemes
# ==========================================
schemes:
  <ExampleApp>:
    build:
      targets:
        <ExampleApp>: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - <ExampleApp>FeatureTests
        - <ExampleApp>UITests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
